<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width">
    <title>A-Frame HTML Shader - Basic</title>
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <!-- we import arjs version without NFT but with marker + location based support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script src="js/aframe-html-shader.min.js"></script>

    <style>
      .update {
        position: fixed;
        top:0;
        left:0;
        font-size: 20px;
        font-family: arial;
        color:red;
      }
      .a-canvas {
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <a-scene embedded arjs>
      <a-marker preset="hiro">

        <a-entity
        material="shader: html; 
        target: #planeHTML; 
        ratio: height; 
        transparent: true; 
        side: double"
        position="0 1 0"
        rotation="-90 0 0"
        scale="0.05 0.05 0.05"
        geometry="primitive: plane; height: 20; width: 40"
        >
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
     
    </a-scene>

    <!-- HTML to render as a material. -->
    <div style="width: 100%; height: 100%; position: fixed; left: 0; top: 0; z-index: -2; overflow: hidden">
      <div id="planeHTML" style="background: linear-gradient(lime, red, blue); width: 500px; height: 200px; font-size: 64px; padding-top: 15px; color: #222; font-weight: 600; display: flex; align-items: center; text-align: center; border-radius: 200px">
        <p style="border: 1px #FFF">ARE YOU HUNGRY?</p>
      </div>
    </div>

    <div class="update">
      v4
    </div>

  </body>
</html>
