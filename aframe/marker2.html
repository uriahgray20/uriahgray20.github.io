<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0,user-scalable=no,maximum-scale=1,width=device-width">
    <title>A-Frame HTML Shader - Basic</title>
    <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
    <!-- we import arjs version without NFT but with marker + location based support -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      #planeHTML {
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <a-scene embedded arjs>
      <a-marker preset="hiro">

        <a-entity
        material="shader: html; 
        target: #planeHTML; 
        ratio: height; 
        transparent: true; 
        side: double"
        position="0 2 -6"
        geometry="primitive: plane; height: 600; width: 400"
        >
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
     
    </a-scene>

    <!-- HTML to render as a material. -->
    <div style="width: 100%; height: 100%; position: fixed; left: 0; top: 0; z-index: -1; overflow: hidden">
      <div id="planeHTML" style="background: linear-gradient(blue, yellow, green); width: 500px; height: 200px; font-size: 64px; padding-top: 15px; color: #222; font-weight: 600; display: flex; align-items: center; text-align: center; border-radius: 200px">
        <p style="border: 1px #FFF">ARE YOU HUNGRY?</p>
      </div>
    </div>
    <script src="js/aframe-html-shader.min.js"></script>
  </body>
</html>
