<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://rawgit.com/mayognaise/aframe-gif-shader/master/dist/aframe-gif-shader.min.js"></script> 
  <body>
    <a-scene embedded arjs environment="#env" vr-mode-ui="enabled: false">
      <a-assets>
        <a-cubemap id="env">
          <img src="Daylight-Box_Right.jpg">
          <img src="Daylight-Box_Left.jpg">
          <img src="Daylight-Box_Top.jpg">
          <img src="Daylight-Box_Bottom.jpg">
          <img src="Daylight-Box_Front.jpg">
          <img src="Daylight-Box_Back.jpg">

        </a-cubemap>
      </a-assets>

      <!-- <a-sky src="skybox.png"></a-sky> -->
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="point" intensity="0.3" position="2 4 4"></a-light>



      <a-marker type='pattern' url='pattern-bird.patt'>
        <!-- <a-image src="greendino.png"
          position= "0 1 0"
          scale= "1 1 1"
          rotation="3 3 3" animation="property: rotation; to: 0 360 0; loop: true; dur: 7000"
        /> -->
        <!-- <a-cylinder radius="0.5" height="1.5" color="#FFC65D"></a-cylinder> -->

        <a-box
        width="0.8"
        height="1.5"
        depth="0.05"
        position= "2 0 0"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"
        src="sky.jpeg"
        animation="
        property: rotation; 
        from: 0 0 0; 
        to: 0 360 0; 
        easing: linear; 
        dur: 10000; 
        loop:true"        
        >
        </a-box>

        <a-sphere
        radius="0.5"
        height="1.5"
        position= "0 1 0"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"
        src="sky.jpeg"
        animation="
        property: position; 
        from: 0 0 0; 
        to: 0 1 0; 
        dir: alternate;
        easing: linear; 
        dur: 5000; 
        loop:true"
        >
        </a-sphere>





      </a-marker>
      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
