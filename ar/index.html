<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script src="https://rawgit.com/mayognaise/aframe-gif-shader/master/dist/aframe-gif-shader.min.js"></script> 
  <body>
    <a-scene embedded arjs environment="#env" vr-mode-ui="enabled: false">
      <a-assets>
        <a-cubemap id="env">
          <img src="Daylight-Box_Right.jpg">
          <img src="Daylight-Box_Left.jpg">
          <img src="Daylight-Box_Top.jpg">
          <img src="Daylight-Box_Bottom.jpg">
          <img src="Daylight-Box_Front.jpg">
          <img src="Daylight-Box_Back.jpg">
        </a-cubemap>

        <img id="tex3" 
        src="https://cdn.glitch.com/7de10cad-38fc-4f8e-a500-fbb2e63da6e9%2Fchecker8.png?v=1567014034775">

      </a-assets>

      <!-- <a-sky src="skybox.png"></a-sky> -->
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="point" intensity="0.3" position="2 4 4"></a-light>



      <a-marker type='pattern' url='pattern-marker4562.patt' smooth="true">

        <a-box
        width="1.5"
        height="2.0"
        depth="0.05"
        position="0 0 0" 
        rotation="90 0 0"               
        src="numbers.png"
        transparent="true"
        alphaTest= "0.5"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"          
        >
        </a-box>





      </a-marker>

      <a-marker type='pattern' url='pattern-marker-circle.patt' smooth="true">

        <a-box
        width="3.8"
        height="4.5"
        depth="0.15"
        position= "0 1 0"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"
        src="poster.png"
        animation="
        property: rotation; 
        from: 0 0 0; 
        to: 0 360 0; 
        easing: linear; 
        dur: 10000; 
        loop:true"        
        >
        </a-box>





      </a-marker>      

      <a-marker type='pattern' url='pattern-marker7543.patt' smooth="true">


        <a-sphere
        radius="1.5"
        height="3"
        position= "0 1 0"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"
        src="lines.png"
        transparent="true"    
        alphaTest= "0.5"            
        animation="
        property: rotation; 
        from: 0 0 0; 
        to: 0 360 0; 
        easing: linear; 
        dur: 10000; 
        loop:true"                
        animation__2="
        property: position; 
        from: 0 0 0; 
        to: 0 1 0; 
        dir: alternate;
        easing: linear; 
        dur: 5000; 
        loop:true"
        >
        </a-sphere>





      </a-marker>

      <a-marker type='pattern' url='pattern-marker-checker.patt' smooth="true">
        <a-cone 
        height="1.5"
        radius-bottom="0.5"
        radius-top="0"            
        position="0 1 0" 
        rotation="0 45 0"
        env-map="#env"
        metalness="1.0"
        roughness="0.0"                       
        src="#tex3"
        animation="
        property: rotation; 
        from: 360 0 0; 
        to: 0 360 0; 
        easing: linear; 
        dur: 10000; 
        loop:true"               
        >                 
        </a-cone> 

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

  </body>
</html>
